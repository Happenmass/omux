<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<title>Cliclaw</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div id="app">
		<header id="header">
			<span class="logo-mark" aria-hidden="true">
				<svg width="22" height="22" viewBox="0 0 22 22" fill="none">
					<path d="M11 2.5c-1.5 2.4-1.5 4.5 0 8.5-3-1-5.5-1-7.5 0 2.4 1.5 4.5 1.5 8.5 0-1 3-1 5.5 0 7.5 1.5-2.4 1.5-4.5 0-8.5 3 1 5.5 1 7.5 0-2.4-1.5-4.5-1.5-8.5 0 1-3 1-5.5 0-7.5z" fill="currentColor" opacity=".95"/>
				</svg>
			</span>
			<h1>Cliclaw</h1>
			<span class="header-divider">|</span>
			<div id="status-indicator">
				<span id="status-dot"></span>
				<span class="status-state-label" id="status-text">connecting</span>
				<span class="queue-pill" id="queue-pill" title="Queued user messages">actions queued</span>
			</div>
			<div class="header-spacer"></div>
			<button class="header-icon-btn" id="settings-btn" type="button" title="MCP Settings" aria-label="MCP Settings">
				<svg width="14" height="14" viewBox="0 0 14 14" fill="none">
					<path d="M7 9a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" stroke="currentColor" stroke-width="1.2"/>
					<path d="M11.3 8.6a1 1 0 0 0 .2 1.1l.03.04a1.2 1.2 0 1 1-1.7 1.7l-.04-.04a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.92v.1a1.2 1.2 0 1 1-2.4 0v-.06a1 1 0 0 0-.66-.92 1 1 0 0 0-1.1.2l-.04.04a1.2 1.2 0 1 1-1.7-1.7l.04-.04a1 1 0 0 0 .2-1.1 1 1 0 0 0-.92-.6h-.1a1.2 1.2 0 0 1 0-2.4h.06a1 1 0 0 0 .92-.66 1 1 0 0 0-.2-1.1l-.04-.04a1.2 1.2 0 1 1 1.7-1.7l.04.04a1 1 0 0 0 1.1.2h.05a1 1 0 0 0 .6-.92v-.1a1.2 1.2 0 1 1 2.4 0v.06a1 1 0 0 0 .6.92 1 1 0 0 0 1.1-.2l.04-.04a1.2 1.2 0 1 1 1.7 1.7l-.04.04a1 1 0 0 0-.2 1.1v.05a1 1 0 0 0 .92.6h.1a1.2 1.2 0 0 1 0 2.4h-.06a1 1 0 0 0-.92.6z" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
				</svg>
			</button>
			<button class="header-icon-btn" id="theme-toggle" type="button" title="切换主题" aria-label="切换主题">
				<svg id="theme-icon-sun" width="14" height="14" viewBox="0 0 14 14" fill="none">
					<circle cx="7" cy="7" r="2.6" stroke="currentColor" stroke-width="1.3"/>
					<g stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
						<path d="M7 1.2v1.6"/><path d="M7 11.2v1.6"/>
						<path d="M1.2 7h1.6"/><path d="M11.2 7h1.6"/>
						<path d="M2.85 2.85l1.13 1.13"/><path d="M10.02 10.02l1.13 1.13"/>
						<path d="M2.85 11.15l1.13-1.13"/><path d="M10.02 3.98l1.13-1.13"/>
					</g>
				</svg>
				<svg id="theme-icon-moon" width="14" height="14" viewBox="0 0 14 14" fill="none" style="display:none">
					<path d="M11.4 8.4A4.4 4.4 0 0 1 5.6 2.6a.5.5 0 0 0-.7-.6A5.4 5.4 0 1 0 12 9.1a.5.5 0 0 0-.6-.7z" fill="currentColor"/>
				</svg>
			</button>
		</header>

		<div id="content">
			<main id="chat-card">
				<div class="chat-header">
					<span class="chat-overline">Conversation</span>
				</div>
				<div id="messages"></div>
				<footer id="input-area">
					<div id="command-dropdown" class="command-dropdown hidden"></div>
					<div id="input-wrapper">
						<textarea id="input" rows="1" placeholder="输入消息或 /指令…" autofocus></textarea>
						<button id="send-btn" type="button" title="发送">
							<svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
								<path d="M7 11.5V2.5M3 6.5L7 2.5l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
							</svg>
							Send
						</button>
					</div>
					<div class="input-meta">
						<span>/ 唤起命令 · Shift + ↵ 换行</span>
						<span class="input-meta-right">
							<span class="context-ring" id="context-ring" hidden>
								<svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
									<circle class="context-ring-track" cx="7" cy="7" r="5.5" fill="none" stroke-width="1.5"></circle>
									<circle class="context-ring-progress" id="context-ring-progress" cx="7" cy="7" r="5.5" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="34.557" stroke-dashoffset="34.557" transform="rotate(-90 7 7)"></circle>
								</svg>
							</span>
							<span class="input-meta-model" id="input-meta-model"></span>
						</span>
					</div>
				</footer>
			</main>

			<aside id="execution-panel" class="peek">
				<div id="execution-resize-handle" class="execution-resize-handle" title="拖拽调整面板宽度"></div>
				<div class="terminal-stack-back" aria-hidden="true"></div>
				<div class="terminal-stack-front" aria-hidden="true"></div>
				<div class="terminal-card">
					<div id="mobile-drag-handle" class="mobile-drag-handle" title="拖动展开/收起"><span></span></div>
					<button id="mobile-peek-row" type="button" class="mobile-peek-row" aria-label="展开终端面板">
						<span class="mobile-peek-icon" aria-hidden="true">
							<svg width="14" height="14" viewBox="0 0 14 14" fill="none">
								<path d="M2 4l2.4 2.4L2 8.8M6.4 9.2H11.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
							</svg>
						</span>
						<div class="mobile-peek-info">
							<div class="mobile-peek-line1">
								<span id="mobile-peek-dot" class="agent-tab-dot status-idle"></span>
								<span id="mobile-peek-name" class="cli-mono">—</span>
								<span id="mobile-peek-meta" class="mobile-peek-meta"></span>
							</div>
							<div id="mobile-peek-tail" class="mobile-peek-tail">暂无活跃的 Agent 会话</div>
						</div>
						<span class="mobile-peek-chev" aria-hidden="true">
							<svg width="10" height="10" viewBox="0 0 10 10" fill="none">
								<path d="M2.5 4l2.5 2.5L7.5 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
							</svg>
						</span>
					</button>
					<div id="agent-tabs-bar" class="agent-tabs-bar" role="tablist">
						<div id="agent-tabs"></div>
						<div class="agent-tabs-spacer"></div>
						<button id="abort-btn" class="abort-btn" type="button" title="发送 ESC 中止当前任务" style="display:none">
							<svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
								<rect x="3.5" y="3.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.4"/>
							</svg>
							<span>中止</span>
						</button>
						<button id="takeover-btn" class="takeover-btn" type="button" style="display:none">
							<svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
								<path d="M5 7V3.2a1 1 0 0 1 2 0V6m0-2.5a1 1 0 0 1 2 0V6m0-1a1 1 0 0 1 2 0v3.5c0 2-1.6 3.5-3.5 3.5h-1c-1.4 0-2-.5-2.5-1.5L2.5 8a1 1 0 0 1 1.6-1.2L5 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
							</svg>
							<span id="takeover-btn-label">接管</span>
						</button>
					</div>
					<div id="terminal-content" class="terminal-content" tabindex="0"></div>
				<input id="terminal-ime-input" class="terminal-ime-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-hidden="true" tabindex="-1" />
					<div id="terminal-empty" class="terminal-empty">暂无活跃的 Agent 会话</div>
					<div id="terminal-statusbar" class="terminal-statusbar" style="display:none">
						<span class="terminal-statusbar-status">
							<span id="terminal-statusbar-state">agent</span>
						</span>
						<span>·</span>
						<span class="terminal-statusbar-cwd" id="terminal-statusbar-cwd"></span>
					</div>
				</div>
			</aside>
			<button id="execution-reopen-btn" type="button" class="execution-reopen-btn" title="打开终端面板">Terminal</button>
		</div>
	</div>

	<!-- Settings Modal -->
	<div id="settings-overlay" class="settings-overlay hidden">
		<div id="settings-modal" class="settings-modal">
			<div class="settings-header">
				<h2>MCP Servers</h2>
				<button id="settings-close" class="settings-close" type="button" aria-label="Close">&times;</button>
			</div>
			<div id="settings-body" class="settings-body">
				<div id="mcp-list" class="mcp-list"></div>
				<div id="mcp-empty" class="mcp-empty">No MCP servers configured. Click "Add" to register one.</div>
			</div>
			<div class="settings-footer">
				<button id="mcp-add-btn" class="mcp-action-btn" type="button">+ Add Server</button>
			</div>

			<!-- Add / Edit form (hidden by default) -->
			<div id="mcp-form" class="mcp-form hidden">
				<div class="settings-header">
					<h2 id="mcp-form-title">Add MCP Server</h2>
					<button id="mcp-form-close" class="settings-close" type="button" aria-label="Close">&times;</button>
				</div>
				<div class="mcp-form-fields">
					<label>Name<input id="mcp-f-name" type="text" placeholder="my-server" autocomplete="off"/></label>
					<label>Description <span class="mcp-hint">(shown to the Main Agent when picking MCPs for SubAgents)</span><textarea id="mcp-f-description" rows="2" placeholder="What this MCP server does, e.g. 'Knowledge graph for token-efficient code review'"></textarea></label>
					<label>Command<input id="mcp-f-command" type="text" placeholder="uvx" autocomplete="off"/></label>
					<label>Args <span class="mcp-hint">(comma-separated)</span><input id="mcp-f-args" type="text" placeholder="code-review-graph, serve" autocomplete="off"/></label>
					<label>Env <span class="mcp-hint">(KEY=VAL, one per line)</span><textarea id="mcp-f-env" rows="4" placeholder="API_KEY=xxx"></textarea></label>
					<label>Type
						<select id="mcp-f-type">
							<option value="stdio" selected>stdio</option>
							<option value="sse">sse</option>
							<option value="http">http</option>
						</select>
					</label>
					<label id="mcp-f-url-group" class="hidden">URL<input id="mcp-f-url" type="text" placeholder="http://localhost:3001/mcp" autocomplete="off"/></label>
					<div id="mcp-form-error" class="mcp-form-error"></div>
				</div>
				<div class="settings-footer">
					<button id="mcp-form-cancel" class="mcp-action-btn mcp-btn-secondary" type="button">Cancel</button>
					<button id="mcp-form-save" class="mcp-action-btn" type="button">Save</button>
				</div>
			</div>
		</div>
	</div>

	<script type="module" src="settings.js"></script>
	<script type="module" src="app.js"></script>
</body>
</html>
