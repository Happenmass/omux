<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cliclaw Chat</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div id="app">
		<header id="header">
			<h1>Cliclaw</h1>
			<div id="status-indicator">
				<span id="status-dot"></span>
				<span id="status-text">连接中...</span>
			</div>
		</header>

		<div id="content">
			<main id="messages"></main>
			<aside id="execution-panel">
				<div id="execution-resize-handle" class="execution-resize-handle" title="拖拽调整面板宽度"></div>
				<nav class="panel-tabs">
					<button class="panel-tab active" data-panel="terminal">终端</button>
					<button class="panel-tab" data-panel="evidence">Learning</button>
				</nav>
				<div id="terminal-view" class="panel-content active">
					<div id="agent-tabs" class="agent-tabs"></div>
					<div id="terminal-content" class="terminal-content"></div>
					<div id="terminal-input-bar" class="terminal-input-bar" style="display:none">
						<input id="terminal-input" type="text" placeholder="输入命令后按回车发送..." />
						<button id="terminal-ctrl-c-btn" title="Ctrl+C">Ctrl+C</button>
						<button id="terminal-esc-btn" title="Escape">Esc</button>
					</div>
					<div id="terminal-empty" class="terminal-empty">暂无活跃的 Agent 会话</div>
				</div>
				<div id="evidence-view" class="panel-content">
					<div id="learning-list-section">
						<div class="learning-list-header">
							<input type="text" id="learning-search" placeholder="Search entries..." />
							<div class="learning-tabs">
								<button class="learning-tab active" data-status="active">Active</button>
								<button class="learning-tab" data-status="archived">Archived</button>
							</div>
							<button id="learning-merge-btn" class="hidden">Merge selected</button>
						</div>
						<ul id="learning-list"></ul>
						<div class="learning-empty" id="learning-list-empty">
							Learning entries appear here after sub-agents finish their work.
						</div>
					</div>
					<div id="learning-resize-handle"></div>
					<div id="learning-detail-section">
						<div class="learning-detail-tabs">
							<button class="learning-detail-tab active" data-tab="summary">Summary</button>
							<button class="learning-detail-tab" data-tab="chat">Chat</button>
						</div>
						<div id="learning-summary-pane" class="learning-detail-pane active"></div>
						<div id="learning-chat-pane" class="learning-detail-pane hidden">
							<div id="learning-chat-messages"></div>
							<div class="learning-chat-input-row">
								<textarea id="learning-chat-input" placeholder="Ask about this change..."></textarea>
								<button id="learning-chat-send">Send</button>
							</div>
						</div>
						<div class="learning-detail-empty" id="learning-detail-empty">
							Select an entry to view its summary.
						</div>
					</div>
				</div>
			</aside>
			<button id="execution-reopen-btn" type="button" class="execution-reopen-btn" title="打开 Learning 面板">Learning</button>
		</div>

		<footer id="input-area">
			<div id="command-dropdown" class="command-dropdown hidden"></div>
			<div id="input-wrapper">
				<textarea id="input" rows="1" placeholder="输入消息或 /指令..." autofocus></textarea>
				<button id="send-btn" title="发送">&#9654;</button>
			</div>
		</footer>
	</div>

	<script type="module" src="app.js"></script>
</body>
</html>
