<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cliclaw Chat</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div id="app">
		<header id="header">
			<h1>Cliclaw</h1>
			<div id="status-indicator">
				<span id="status-dot"></span>
				<span id="status-text">连接中...</span>
			</div>
		</header>

		<div id="content">
			<main id="messages"></main>
			<aside id="execution-panel">
				<div id="execution-resize-handle" class="execution-resize-handle" title="拖拽调整面板宽度"></div>
				<nav class="panel-tabs">
					<button class="panel-tab active" data-panel="terminal">终端</button>
					<button class="panel-tab" data-panel="evidence">扩展</button>
				</nav>
				<div id="terminal-view" class="panel-content active">
					<div id="agent-tabs" class="agent-tabs"></div>
					<div id="terminal-content" class="terminal-content"></div>
					<div id="terminal-input-bar" class="terminal-input-bar" style="display:none">
						<input id="terminal-input" type="text" placeholder="输入命令后按回车发送..." />
						<button id="terminal-ctrl-c-btn" title="Ctrl+C">Ctrl+C</button>
						<button id="terminal-esc-btn" title="Escape">Esc</button>
					</div>
					<div id="terminal-empty" class="terminal-empty">暂无活跃的 Agent 会话</div>
				</div>
				<!-- TODO: 此面板预留用于后续扩展功能（原 ExecutionEvent 执行证据卡片已移除） -->
				<div id="evidence-view" class="panel-content">
					<div class="execution-panel-header">
						<h2>扩展面板</h2>
						<p>此面板预留，待扩展功能接入。</p>
					</div>
				</div>
			</aside>
			<button id="execution-reopen-btn" type="button" class="execution-reopen-btn" title="打开扩展面板">扩展面板</button>
		</div>

		<footer id="input-area">
			<div id="command-dropdown" class="command-dropdown hidden"></div>
			<div id="input-wrapper">
				<textarea id="input" rows="1" placeholder="输入消息或 /指令..." autofocus></textarea>
				<button id="send-btn" title="发送">&#9654;</button>
			</div>
		</footer>
	</div>

	<script type="module" src="app.js"></script>
</body>
</html>
